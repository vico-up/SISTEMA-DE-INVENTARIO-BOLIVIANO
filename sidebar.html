<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <?!= include('estilos'); ?>
  <!-- Vue.js 3 (CDN) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Iconos (Phosphor Icons o similar) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
  <div id="app" class="container">

    <!-- Header -->
    <header>
      <h2>Cotización</h2>
      <div class="actions">
        <button @click="cargarDesdeHoja" title="Cargar desde la Hoja" class="btn-icon"><i
            class="ph ph-file-arrow-down"></i></button>
        <button @click="limpiarCarrito" title="Limpiar todo" class="btn-icon"><i class="ph ph-trash"></i></button>
      </div>
    </header>

    <!-- Banner de Reemplazo -->
    <div v-if="reemplazandoIndex !== null" class="replacement-banner">
      <span>Reemplazando: <b>{{ carrito[reemplazandoIndex].nombre }}</b></span>
      <button @click="reemplazandoIndex = null" class="btn-cancel">Cancelar</button>
    </div>

    <!-- Datos Cliente -->
    <div class="client-box">
      <label>Nombre del Cliente</label>
      <input type="text" v-model="cliente" placeholder="Ej: Marcelo Quiroga">
    </div>

    <!-- Buscador -->
    <div class="search-box">
      <input type="text" v-model="busqueda" placeholder="Buscar producto o servicio..." @input="filtrarItems">
      <i class="ph ph-magnifying-glass search-icon"></i>
    </div>

    <!-- Resultados de Búsqueda (Dropdown) -->
    <div v-if="busqueda && resultados.length > 0" class="search-results">
      <div v-for="(item, index) in resultados" :key="item.sku + item.nombre + index" class="search-item"
        @click="seleccionarItem(item)">
        <div class="item-info">
          <span class="item-name">{{ item.nombre }}</span>
          <span class="item-meta">{{ item.marca }} • Stock: {{ item.stock }}</span>
        </div>
        <div class="item-price">Bs {{ item.precio }}</div>
      </div>
    </div>

    <!-- Lista de Items (Carrito) -->
    <div class="cart-list">
      <div v-if="carrito.length === 0" class="empty-state">
        <i class="ph ph-shopping-cart"></i>
        <p>La cotización está vacía</p>
      </div>

      <div v-else v-for="(item, index) in carrito" :key="index" class="cart-item"
        :class="{ 'is-replacing': reemplazandoIndex === index }">
        <div class="cart-item-header">
          <span class="item-name">{{ item.nombre }}</span>
          <div class="item-actions">
            <button @click="prepararReemplazo(index)" class="btn-action" title="Reemplazar"><i
                class="ph ph-arrows-clockwise"></i></button>
            <button @click="eliminarItem(index)" class="btn-remove"><i class="ph ph-x"></i></button>
          </div>
        </div>
        <div class="cart-item-controls">
          <input type="number" v-model.number="item.cantidad" min="1" class="qty-input">
          <span class="x-sign">x</span>
          <input type="number" v-model.number="item.precio" class="price-input">
          <span class="item-subtotal">Bs {{ (item.cantidad * item.precio).toFixed(2) }}</span>
        </div>
      </div>
    </div>

    <!-- Footer Totales -->
    <footer class="cart-footer">
      <div class="total-row discount-row">
        <span>Descuento (Bs):</span>
        <input type="number" v-model.number="descuento" class="discount-input">
      </div>
      <div class="total-row">
        <span>Total:</span>
        <span class="total-amount">Bs {{ totalCotizacion }}</span>
      </div>
      <button class="btn-primary" @click="generarPDF" :disabled="carrito.length === 0 || procesando">
        <span v-if="!procesando">Generar PDF</span>
        <span v-else>Procesando...</span>
      </button>
    </footer>

  </div>

  <?!= include('js'); ?>
</body>

</html>
